        // ======================== CART STATE ========================
        let cart = [];

        // Helper: load/save cart
        function loadCart() {
            try {
                const savedCart = localStorage.getItem('daAlooCart');
                if (savedCart) cart = JSON.parse(savedCart);
                cart = cart.map(item => { item.availableExtras = item.availableExtras || []; return item; });
            } catch(e) { cart = []; }
        }
        function saveCart() {
            try { localStorage.setItem('daAlooCart', JSON.stringify(cart)); } catch(e) { sessionStorage.setItem('daAlooCart', JSON.stringify(cart)); }
        }

        function parsePrice(price) {
            if (typeof price === 'string' && price.includes('-')) return parseInt(price.split('-')[0]);
            return parseInt(price) || 0;
        }

        // Generate category tabs
        function generateCategoryTabs() {
            const tabsContainer = document.getElementById('categoryTabs');
            let first = true;
            for (const [categoryName] of Object.entries(MENU)) {
                const tabId = categoryName.toLowerCase().replace(/[ &\/]/g, '-');
                const button = document.createElement('button');
                button.className = `category-tab ${first ? 'active' : ''}`;
                button.setAttribute('data-category', tabId);
                button.innerHTML = `
                    <div class="tab-content">
                        <div class="tab-image">
                            <img src="${categoryImages[categoryName]}" alt="${categoryName}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\'font-size:1.5rem;color:#666;\'>🍽️</div>'">
                        </div>
                        <span class="tab-text">${categoryName}</span>
                    </div>
                `;
                tabsContainer.appendChild(button);
                first = false;
            }
        }

        // Generate menu items with square images
        function generateMenuItems() {
            const menuContainer = document.getElementById('menuItems');
            let first = true;
            for (const [categoryName, items] of Object.entries(MENU)) {
                const categoryId = categoryName.toLowerCase().replace(/[ &\/]/g, '-');

                categoryDiv.className = `category-content ${first ? 'active' : ''}`;
                categoryDiv.id = categoryId;
                let itemsHTML = '';
                for (const item of items) {
                    const hasVariants = item.variants && item.variants.length > 0;
                    const hasExtras = item.extras && item.extras.length > 0;
                    let displayPrice = `Rs ${item.price}`;
                    let priceForButton = parsePrice(item.price);
                    if (hasVariants) {
                        const prices = item.variants.map(v => v.price);
                        displayPrice = `Rs ${Math.min(...prices)} - ${Math.max(...prices)}`;
                        priceForButton = Math.min(...prices);
                    }
                    let buttonText = 'Add to Cart', buttonIcon = 'plus', btnClass = '';
                    if (hasVariants) { buttonText = 'Choose Variant'; buttonIcon = 'list-ul'; btnClass = 'customize-btn'; }
                    
                    // Image handling: use item.image if available, otherwise fallback to logo
                    const imgSrc = item.image && item.image.trim() !== '' ? item.image : 'images/logo.png';
                    
                   // Replace the old itemsHTML assignment with this:
itemsHTML += `
    <div class="menu-item-card">
        <div class="item-top-content">
            <div class="item-image">
                <img src="${imgSrc}" alt="${item.name}" loading="lazy" onerror="this.onerror=null; this.src='images/logo.png';">
            </div>
            <div class="item-info-stack">
                <h3 class="item-name">${item.name}</h3>
                <div class="item-price">Rs ${item.price}</div>
                <button class="add-to-cart-btn ${btnClass}" 
                        data-name="${item.name}" 
                        data-price="${priceForButton}"
                        data-has-variants="${hasVariants}"
                        data-has-extras="${hasExtras}">
                    <i class="fas fa-${buttonIcon}"></i> ${buttonText}
                </button>
            </div>
        </div>
        ${item.details ? `<div class="item-details">${item.details}</div>` : ''}
    </div>
`;
                }
                categoryDiv.innerHTML = `<div class="category-header"><h2 class="category-title">${categoryName}</h2></div><div class="category-items">${itemsHTML}</div>`;
                menuContainer.appendChild(categoryDiv);
                first = false;
            }
        }

        function setupTabSwitching() {
            const tabs = document.querySelectorAll('.category-tab');
            const contents = document.querySelectorAll('.category-content');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.getAttribute('data-category')).classList.add('active');
                });
            });
        }

        // Save menu (image download)
        function setupSaveMenuButton() {
            const saveBtn = document.getElementById('saveMenuBtn');
            const notif = document.getElementById('saveNotification');
            saveBtn.addEventListener('click', () => {
                notif.classList.add('show');
                const link = document.createElement('a');
                link.href = 'images/menu.jpg';
                link.download = 'da-aloo-menu.jpg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => notif.classList.remove('show'), 3000);
            });
        }

        // Cart & Modal Logic
        function findMenuItem(itemName) {
            for (const [, items] of Object.entries(MENU)) {
                const found = items.find(i => i.name === itemName);
                if (found) return found;
            }
            return null;
        }

        function addToCart(name, price, variant, extras, availableExtras = []) {
            const cartItem = { name, basePrice: price, variant, extras, availableExtras, quantity: 1, totalPrice: price + extras.reduce((s, e) => s + e.price, 0) };
            let existingIndex = -1;
            if (availableExtras.length === 0) {
                existingIndex = cart.findIndex(item => item.name === cartItem.name && JSON.stringify(item.variant) === JSON.stringify(cartItem.variant) && JSON.stringify(item.extras) === JSON.stringify(cartItem.extras));
            }
            if (existingIndex > -1) {
                cart[existingIndex].quantity += 1;
                cart[existingIndex].totalPrice = (cart[existingIndex].basePrice + cart[existingIndex].extras.reduce((s, e) => s + e.price, 0)) * cart[existingIndex].quantity;
            } else {
                cart.push(cartItem);
            }
            saveCart();
            updateCartBadge();
            if (document.getElementById('cartModal').style.display === 'block') updateCartDisplay();
        }

        function updateCartBadge() {
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = total;
        }

        function updateCartDisplay() {
            const cartItemsDiv = document.getElementById('cartItems');
            const cartTotalSpan = document.getElementById('cartTotal');
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = `<div class="empty-cart-message"><i class="fas fa-shopping-cart"></i><p>Your cart is empty</p></div>`;
                cartTotalSpan.textContent = 'Total: Rs 0';
                return;
            }
            let itemsHTML = '', total = 0;
            cart.forEach((item, idx) => {
                const itemTotal = item.totalPrice;
                total += itemTotal;
                let extrasHTML = '';
                if (item.availableExtras && item.availableExtras.length) {
                    const grouped = {};
                    item.availableExtras.forEach(extra => { const g = extra.group || 'default'; if (!grouped[g]) grouped[g] = []; grouped[g].push(extra); });
                    extrasHTML = '<div class="cart-extras-options">';
                    for (const [group, extrasGroup] of Object.entries(grouped)) {
                        const isRadio = extrasGroup[0].type === 'radio';
                        extrasHTML += `<div class="extras-group ${isRadio ? 'radio-group' : ''}">`;
                        extrasGroup.forEach(opt => {
                            const isChecked = item.extras.some(e => e.name === opt.name);
                            if (isRadio) {
                                extrasHTML += `<label class="cart-extra-label"><input type="radio" class="extra-radio" name="extra-${idx}-${group}" data-index="${idx}" data-name="${opt.name}" data-price="${opt.price}" data-group="${group}" ${isChecked ? 'checked' : ''}> ${opt.name} ${opt.price > 0 ? `(+Rs ${opt.price})` : ''}</label>`;
                            } else {
                                extrasHTML += `<label class="cart-extra-label"><input type="checkbox" class="extra-checkbox" data-index="${idx}" data-name="${opt.name}" data-price="${opt.price}" ${isChecked ? 'checked' : ''}> ${opt.name} (+Rs ${opt.price})</label>`;
                            }
                        });
                        extrasHTML += '</div>';
                    }
                    extrasHTML += '</div>';
                }
                itemsHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name} × ${item.quantity}</div>
                            ${item.variant ? `<div class="cart-item-variant">Variant: ${item.variant.name}</div>` : ''}
                            ${extrasHTML}
                            <div class="cart-item-price">Rs ${itemTotal}</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="quantity-btn" data-index="${idx}" data-action="decrease">-</button>
                            <span class="quantity-display">${item.quantity}</span>
                            <button class="quantity-btn" data-index="${idx}" data-action="increase">+</button>
                            <button class="remove-btn" data-index="${idx}"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
            cartItemsDiv.innerHTML = itemsHTML;
            cartTotalSpan.textContent = `Total: Rs ${total}`;
        }

        function handleCartItemChange(e) {
            if (e.target.classList.contains('extra-checkbox')) {
                const idx = parseInt(e.target.dataset.index);
                const name = e.target.dataset.name;
                const price = parseInt(e.target.dataset.price);
                if (e.target.checked) { if (!cart[idx].extras.some(ex => ex.name === name)) cart[idx].extras.push({ name, price }); }
                else { cart[idx].extras = cart[idx].extras.filter(ex => ex.name !== name); }
                const extrasTotal = cart[idx].extras.reduce((s, ex) => s + ex.price, 0);
                cart[idx].totalPrice = (cart[idx].basePrice + extrasTotal) * cart[idx].quantity;
                saveCart(); updateCartDisplay();
            }
            if (e.target.classList.contains('extra-radio')) {
                const idx = parseInt(e.target.dataset.index);
                const name = e.target.dataset.name;
                const price = parseInt(e.target.dataset.price);
                const group = e.target.dataset.group;
                const item = cart[idx];
                const groupExtras = item.availableExtras.filter(ex => ex.group === group);
                item.extras = item.extras.filter(ex => !groupExtras.some(ge => ge.name === ex.name));
                if (!item.extras.some(ex => ex.name === name)) item.extras.push({ name, price });
                const extrasTotal = item.extras.reduce((s, ex) => s + ex.price, 0);
                item.totalPrice = (item.basePrice + extrasTotal) * item.quantity;
                saveCart(); updateCartDisplay();
            }
        }

        function handleCartItemClick(e) {
            if (e.target.classList.contains('quantity-btn') || e.target.closest('.quantity-btn')) {
                const btn = e.target.classList.contains('quantity-btn') ? e.target : e.target.closest('.quantity-btn');
                const idx = parseInt(btn.dataset.index);
                if (btn.dataset.action === 'increase') cart[idx].quantity += 1;
                else if (btn.dataset.action === 'decrease') {
                    if (cart[idx].quantity > 1) cart[idx].quantity -= 1;
                    else { cart.splice(idx, 1); saveCart(); updateCartBadge(); updateCartDisplay(); return; }
                }
                const extrasTotal = cart[idx].extras.reduce((s, e) => s + e.price, 0);
                cart[idx].totalPrice = (cart[idx].basePrice + extrasTotal) * cart[idx].quantity;
                saveCart(); updateCartBadge(); updateCartDisplay();
            }
            if (e.target.classList.contains('remove-btn') || e.target.closest('.remove-btn')) {
                const btn = e.target.classList.contains('remove-btn') ? e.target : e.target.closest('.remove-btn');
                const idx = parseInt(btn.dataset.index);
                if (confirm('Remove Item?')) { cart.splice(idx, 1); saveCart(); updateCartBadge(); updateCartDisplay(); }
            }
        }

        function openCustomizationModal(itemName) {
            const item = findMenuItem(itemName);
            if (!item || !item.variants) return;
            currentCustomizationItem = item;
            const modal = document.getElementById('customizationModal');
            document.getElementById('customizationItemName').textContent = `Select Variant for ${itemName}`;
            let html = '<div class="customization-section"><h4>Select Variant</h4>';
            item.variants.forEach((v, idx) => { html += `<label class="variant-option"><input type="radio" name="variant" value="${v.name}" data-price="${v.price}" ${idx===0?'checked':''}> <span class="variant-name">${v.name}</span> <span class="variant-price">Rs ${v.price}</span></label>`; });
            html += '</div>';
            document.getElementById('customizationBody').innerHTML = html;
            document.getElementById('customTotalPrice').textContent = item.variants[0].price;
            document.querySelectorAll('input[name="variant"]').forEach(inp => inp.addEventListener('change', () => { document.getElementById('customTotalPrice').textContent = inp.dataset.price; }));
            modal.style.display = 'block';
        }

        function closeCustomizationModal() { document.getElementById('customizationModal').style.display = 'none'; currentCustomizationItem = null; }

        function setupCart() {
            const cartModal = document.getElementById('cartModal');
            document.getElementById('cartIcon').addEventListener('click', () => { cartModal.style.display = 'block'; updateCartDisplay(); });
            document.getElementById('closeCart').addEventListener('click', () => cartModal.style.display = 'none');
            document.getElementById('checkoutBtn').addEventListener('click', () => {
                if (cart.length === 0) { alert('Your cart is empty!'); return; }
                localStorage.setItem('daAlooOrigin', 'index.html');
                saveCart();
                window.location.href = 'location.html';
            });
            window.addEventListener('click', (e) => { if (e.target === cartModal) cartModal.style.display = 'none'; });
            document.getElementById('cartItems').addEventListener('click', handleCartItemClick);
            document.getElementById('cartItems').addEventListener('change', handleCartItemChange);
            document.addEventListener('click', (e) => {
                const btn = e.target.closest('.add-to-cart-btn');
                if (btn) {
                    const hasVariants = btn.getAttribute('data-has-variants') === 'true';
                    const name = btn.getAttribute('data-name');
                    const price = parseInt(btn.getAttribute('data-price'));
                    if (hasVariants) openCustomizationModal(name);
                    else {
                        const itemData = findMenuItem(name);
                        addToCart(name, price, null, [], itemData.extras || []);
                        const original = btn.innerHTML;
                        btn.innerHTML = '<i class="fas fa-check"></i> Added!';
                        btn.style.background = '#2ecc71';
                        setTimeout(() => { btn.innerHTML = original; btn.style.background = ''; }, 1000);
                    }
                }
            });
        }

        function setupCustomizationModal() {
            const modal = document.getElementById('customizationModal');
            document.getElementById('closeCustomization').addEventListener('click', closeCustomizationModal);
            document.getElementById('cancelCustomization').addEventListener('click', closeCustomizationModal);
            document.getElementById('addToCartCustom').addEventListener('click', () => {
                if (currentCustomizationItem) {
                    const selected = document.querySelector('input[name="variant"]:checked');
                    if (selected) {
                        const variant = { name: selected.value, price: parseInt(selected.dataset.price) };
                        addToCart(currentCustomizationItem.name, variant.price, variant, []);
                    }
                    closeCustomizationModal();
                }
            });
            window.addEventListener('click', (e) => { if (e.target === modal) closeCustomizationModal(); });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
            generateCategoryTabs();
            generateMenuItems();
            setupTabSwitching();
            setupSaveMenuButton();
            setupCart();
            setupCustomizationModal();
            updateCartBadge();
            document.getElementById('currentYear').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
