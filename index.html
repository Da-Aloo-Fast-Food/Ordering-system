<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Da Aloo – Where Hunger Comes to an End | Visual Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fef7e8;
            color: #2c1810;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* header */
        .site-header {
            background: #1f2c1b;
            background: linear-gradient(135deg, #1f2c1b 0%, #2f3e2a 100%);
            color: #f9e7c2;
            padding: 20px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-section .logo-container {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .main-logo {
            height: 60px;
            width: auto;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
        }

        .tagline {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            background: #e3b23c;
            padding: 4px 12px;
            border-radius: 40px;
            color: #2c1810;
            font-weight: 600;
        }

        .site-nav {
            display: flex;
            gap: 28px;
        }

        .nav-link {
            color: #f9e7c2;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: 0.2s;
            padding: 6px 0;
            border-bottom: 2px solid transparent;
        }

        .nav-link.active, .nav-link:hover {
            border-bottom-color: #e3b23c;
            color: #ffdd88;
        }

        /* menu section */
        .menu-section {
            padding: 40px 0 70px;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 30px;
            gap: 16px;
        }

        .section-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 3.5rem;
            color: #bd7f37;
            letter-spacing: 2px;
        }

        .save-menu-btn {
            background: #2c3e2b;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .save-menu-btn:hover {
            background: #e3b23c;
            color: #2c1810;
            transform: scale(0.97);
        }

        /* cart icon */
        .cart-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200;
        }

        .cart-icon {
            background: #e3b23c;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #2c1810;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.2s;
            position: relative;
        }

        .cart-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #c0392b;
            color: white;
            border-radius: 30px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            min-width: 24px;
            text-align: center;
        }

        .cart-icon:hover {
            transform: scale(1.05);
            background: #d4a12a;
        }

        /* category tabs */
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 40px;
            overflow-x: auto;
            padding-bottom: 8px;
            justify-content: center;
        }

        .category-tab {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 60px;
            padding: 8px 18px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .tab-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-image {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            background: #f0e2c5;
        }

        .tab-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tab-text {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .category-tab.active {
            background: #e3b23c;
            color: #2c1810;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* menu grid & cards */
        .category-content {
            display: none;
            animation: fade 0.25s ease;
        }

        .category-content.active {
            display: block;
        }

        .category-header {
            margin-bottom: 28px;
            border-left: 8px solid #e3b23c;
            padding-left: 20px;
        }

        .category-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.2rem;
            color: #5a3a22;
        }

        .category-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }

        /* menu item card with image */
        .menu-item-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .menu-item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.12);
        }

        .item-image-wrapper {
            width: 100%;
            height: 180px;
            background: #f8f1e2;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #f0e0c0;
        }

        .item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .menu-item-card:hover .item-image {
            transform: scale(1.02);
        }

        .item-info {
            padding: 20px 18px 18px;
            flex: 1;
        }

        .item-main-container {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .item-name {
            font-size: 1.35rem;
            font-weight: 800;
            color: #2c1810;
            letter-spacing: -0.2px;
        }

        .item-price {
            font-weight: 800;
            font-size: 1.25rem;
            background: #f9e5b3;
            padding: 4px 12px;
            border-radius: 40px;
            color: #a5551a;
        }

        .item-details {
            font-size: 0.8rem;
            color: #7f5e3a;
            margin: 8px 0 12px;
            line-height: 1.3;
        }

        .add-to-cart-btn {
            background: #2c3e2b;
            border: none;
            color: white;
            font-weight: 700;
            padding: 10px 0;
            width: 100%;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .add-to-cart-btn:hover {
            background: #e3b23c;
            color: #2c1810;
        }

        /* cart modal */
        .cart-modal, .customization-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .cart-modal-content, .customization-modal-content {
            background: #fff9ef;
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .cart-modal-header, .customization-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #e3b23c;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .cart-items {
            max-height: 50vh;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            background: #fef3e0;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 20px;
            flex-wrap: wrap;
        }

        .cart-item-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .quantity-btn, .remove-btn {
            background: #e1cba6;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .checkout-btn {
            background: #e3b23c;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            margin-top: 15px;
            cursor: pointer;
        }

        .floating-whatsapp {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            z-index: 99;
        }

        .save-notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            opacity: 0;
            transition: 0.2s;
            z-index: 1100;
            pointer-events: none;
        }

        .save-notification.show {
            opacity: 1;
            bottom: 120px;
        }

        footer {
            background: #1f2c1b;
            color: #d4c5a3;
            text-align: center;
            padding: 28px 0;
            margin-top: 40px;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media (max-width: 680px) {
            .category-items {
                grid-template-columns: 1fr;
            }
            .item-image-wrapper {
                height: 150px;
            }
            .section-title {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-container">
                    <img src="images/logo.png" alt="Da Aloo Logo" class="main-logo" onerror="this.src='https://placehold.co/60x60?text=DA'">
                    <div class="tagline">"Where Hunger Comes to an End"</div>
                </div>
            </div>
            <nav class="site-nav">
                <a href="index.html" class="nav-link active">Menu</a>
                <a href="offers.html" class="nav-link">Offers</a>
                <a href="about.html" class="nav-link">About</a>
            </nav>
        </div>
    </div>
</header>

<main>
    <section class="menu-section">
        <div class="container">
            <div class="menu-header">
                <h1 class="section-title menu-page-title">Our Menu</h1>
                <button class="save-menu-btn" id="saveMenuBtn"><i class="fas fa-camera"></i> Save Menu</button>
            </div>
            <div class="cart-container">
                <div class="cart-icon" id="cartIcon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartBadge">0</span>
                </div>
            </div>
            <div class="category-tabs" id="categoryTabs" role="tablist"></div>
            <div class="menu-items-grid" id="menuItems"></div>
        </div>
    </section>
</main>

<div class="cart-modal" id="cartModal">
    <div class="cart-modal-content">
        <div class="cart-modal-header"><h2>Your Order</h2><span class="close-cart" id="closeCart">&times;</span></div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total" id="cartTotal">Total: Rs 0</div>
        <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-map-marker-alt"></i> Confirm Location</button>
    </div>
</div>

<div class="customization-modal" id="customizationModal">
    <div class="customization-modal-content">
        <div class="customization-header"><h3 id="customizationModalTitle">Select Variant</h3><span class="close-customization" id="closeCustomization">&times;</span></div>
        <div class="customization-body" id="customizationBody"></div>
        <div class="customization-actions" style="display:flex; gap:12px; margin-top:20px;">
            <button class="cancel-customization" id="cancelCustomization" style="flex:1;">Cancel</button>
            <button class="add-to-cart-custom" id="addToCartCustom" style="flex:2; background:#e3b23c; border:none; border-radius:40px; font-weight:bold;">Add to Cart - Rs <span id="customTotalPrice">0</span></button>
        </div>
    </div>
</div>

<footer class="site-footer">
    <div class="container"><p>&copy; <span id="currentYear"></span> Da Aloo. All rights reserved.</p></div>
</footer>
<a class="floating-whatsapp" href="tel:+9779847375984"><i class="fas fa-phone-alt"></i> Call Now</a>
<div class="save-notification" id="saveNotification"><i class="fas fa-check-circle"></i> Menu image downloaded!</div>

<script>
    // Google Analytics
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CFXTRJEMHN');

    // MENU DATA (dynamic fetch, fallback extended with popular items)
    let MENU = {};

    // CART
    let cart = [];
    let currentCustomizationItem = null;

    const parsePrice = (p) => parseInt(String(p).split('-')[0]) || 0;
    function saveCart() { try { localStorage.setItem('daAlooCart', JSON.stringify(cart)); } catch(e) { sessionStorage.setItem('daAlooCart', JSON.stringify(cart)); } }
    function loadCart() {
        try {
            const saved = localStorage.getItem('daAlooCart') || sessionStorage.getItem('daAlooCart');
            if(saved) cart = JSON.parse(saved);
            else cart = [];
        } catch(e) { cart = []; }
        updateCartBadge();
    }
    function updateCartBadge() {
        const total = cart.reduce((s,i)=>s+i.quantity,0);
        document.getElementById('cartBadge').innerText = total;
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function addToCart(name, basePrice, variant = null, extras = [], availableExtras = []) {
        const existingIdx = cart.findIndex(item => item.name === name && JSON.stringify(item.variant) === JSON.stringify(variant) && JSON.stringify(item.extras) === JSON.stringify(extras));
        if(existingIdx > -1) {
            cart[existingIdx].quantity += 1;
        } else {
            cart.push({ name, basePrice, variant, extras, availableExtras, quantity: 1 });
        }
        saveCart();
        updateCartBadge();
        const modal = document.getElementById('cartModal');
        if(modal.style.display === 'block') updateCartDisplay();
    }

    function updateCartDisplay() {
        const container = document.getElementById('cartItems');
        const totalSpan = document.getElementById('cartTotal');
        if(!cart.length) {
            container.innerHTML = `<div class="empty-cart-message"><i class="fas fa-shopping-cart"></i><p>Your cart is empty</p></div>`;
            totalSpan.innerText = 'Total: Rs 0';
            return;
        }
        let total = 0;
        let html = '';
        cart.forEach((item, idx) => {
            const extrasSum = item.extras.reduce((s,e)=>s+e.price,0);
            const itemTotal = (item.basePrice + extrasSum) * item.quantity;
            total += itemTotal;
            html += `<div class="cart-item"><div><div><strong>${escapeHtml(item.name)}</strong> × ${item.quantity}</div>${item.variant ? `<div>Variant: ${escapeHtml(item.variant.name)}</div>` : ''}<div class="cart-item-price">Rs ${itemTotal}</div></div>
            <div class="cart-item-controls"><button class="quantity-btn" data-index="${idx}" data-action="decrease">-</button><span>${item.quantity}</span><button class="quantity-btn" data-index="${idx}" data-action="increase">+</button><button class="remove-btn" data-index="${idx}"><i class="fas fa-trash"></i></button></div></div>`;
        });
        container.innerHTML = html;
        totalSpan.innerText = `Total: Rs ${total}`;
    }

    // Find full item data by name
    function findMenuItem(itemName) {
        for(let cat in MENU) {
            const found = MENU[cat].find(i => i.name === itemName);
            if(found) return found;
        }
        return null;
    }

    // Generate tabs & menu items with PER-ITEM IMAGES (itemname.jpeg)
    const categoryImages = {
        "Aloo Fries": "images/categories/aloo-fries.jpg","Da Aloo Special": "images/categories/special.jpg","Spirals": "images/categories/spirals.jpg","Katti Roll": "images/categories/katti-roll.jpg","Mo:Mo": "images/categories/momo.jpg","Burger": "images/categories/burger.jpg","Sandwich": "images/categories/sandwich.jpg","Keema Noodles": "images/categories/keema-noodles.jpg","Fried Rice": "images/categories/fried-rice.jpg","Chowmein": "images/categories/chowmein.jpg","Snacks": "images/categories/snacks.jpg","Chicken Wings": "images/categories/chicken-wings.jpg","Rice or Roti Meal": "images/categories/rice-roti.jpg","Cold Drinks": "images/categories/cold-drinks.jpg","Hot Drinks": "images/categories/hot-drinks.jpg"
    };
    function handleTabImageError(img, cat) { if(img.parentElement) img.parentElement.innerHTML = '<div style="font-size:1.5rem;">🍽️</div>'; }

    function generateTabs() {
        const container = document.getElementById('categoryTabs');
        container.innerHTML = '';
        let first=true;
        for(let cat in MENU) {
            const tabId = cat.toLowerCase().replace(/[ &\/]/g, '-');
            const btn = document.createElement('button');
            btn.className = `category-tab ${first ? 'active' : ''}`;
            btn.setAttribute('data-category', tabId);
            btn.innerHTML = `<div class="tab-content"><div class="tab-image"><img src="${categoryImages[cat] || ''}" alt="${cat}" onerror="handleTabImageError(this,'${cat}')"></div><span class="tab-text">${escapeHtml(cat)}</span></div>`;
            container.appendChild(btn);
            first=false;
        }
    }

    // Core: generate each menu item with image from images/itemname.jpeg
    function generateMenuItems() {
        const container = document.getElementById('menuItems');
        container.innerHTML = '';
        let firstCat = true;
        for(let [category, items] of Object.entries(MENU)) {
            const catId = category.toLowerCase().replace(/[ &\/]/g, '-');
            const catDiv = document.createElement('div');
            catDiv.className = `category-content ${firstCat ? 'active' : ''}`;
            catDiv.id = catId;
            let itemsHTML = '';
            for(let item of items) {
                const hasVariants = item.variants && item.variants.length > 0;
                let displayPrice = `Rs ${item.price}`;
                let basePriceForBtn = parsePrice(item.price);
                if(hasVariants) {
                    const prices = item.variants.map(v=>v.price);
                    displayPrice = `Rs ${Math.min(...prices)} - ${Math.max(...prices)}`;
                    basePriceForBtn = Math.min(...prices);
                }
                // Construct image path using item.name + ".jpeg"
                const imageFileName = `${item.name}.jpeg`;
                const imagePath = `images/${encodeURIComponent(imageFileName)}`;
                const buttonText = hasVariants ? 'Choose Variant' : 'Add to Cart';
                const btnIcon = hasVariants ? 'list-ul' : 'plus';
                
                itemsHTML += `
                    <div class="menu-item-card">
                        <div class="item-image-wrapper">
                            <img class="item-image" src="${imagePath}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/300x180?text=🍟+Da+Aloo';">
                        </div>
                        <div class="item-info">
                            <div class="item-main-container">
                                <h3 class="item-name">${escapeHtml(item.name)}</h3>
                                <div class="item-price">${displayPrice}</div>
                            </div>
                            ${item.details ? `<div class="item-details">${escapeHtml(item.details)}</div>` : ''}
                            <button class="add-to-cart-btn ${hasVariants ? 'customize-btn' : ''}" 
                                    data-name="${escapeHtml(item.name)}" 
                                    data-price="${basePriceForBtn}"
                                    data-has-variants="${hasVariants}"
                                    data-has-extras="${!!(item.extras && item.extras.length)}">
                                <i class="fas fa-${btnIcon}"></i> ${buttonText}
                            </button>
                        </div>
                    </div>
                `;
            }
            catDiv.innerHTML = `<div class="category-header"><h2 class="category-title">${escapeHtml(category)}</h2></div><div class="category-items">${itemsHTML}</div>`;
            container.appendChild(catDiv);
            firstCat = false;
        }
    }

    function setupTabs() {
        const tabs = document.querySelectorAll('.category-tab');
        const contents = document.querySelectorAll('.category-content');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t=>{t.classList.remove('active'); t.setAttribute('aria-selected','false');});
                contents.forEach(c=>c.classList.remove('active'));
                tab.classList.add('active');
                const targetId = tab.getAttribute('data-category');
                document.getElementById(targetId).classList.add('active');
            });
        });
    }

    // Customization for variants
    function openCustomizationModal(itemName) {
        const item = findMenuItem(itemName);
        if(!item || !item.variants) return;
        currentCustomizationItem = item;
        const modal = document.getElementById('customizationModal');
        const body = document.getElementById('customizationBody');
        const totalSpan = document.getElementById('customTotalPrice');
        let html = `<div class="customization-section"><h4>Pick your ${escapeHtml(item.name)} variant</h4>`;
        let firstPrice = 0;
        item.variants.forEach((v,idx) => {
            if(idx===0) firstPrice = v.price;
            html += `<label style="display:block; margin:12px 0;"><input type="radio" name="variantRadio" value="${escapeHtml(v.name)}" data-price="${v.price}" ${idx===0 ? 'checked' : ''}> <strong>${escapeHtml(v.name)}</strong> - Rs ${v.price}</label>`;
        });
        html += `</div>`;
        body.innerHTML = html;
        totalSpan.innerText = firstPrice;
        body.querySelectorAll('input[name="variantRadio"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                totalSpan.innerText = e.target.dataset.price;
            });
        });
        modal.style.display = 'flex';
    }

    function closeCustomModal() { document.getElementById('customizationModal').style.display = 'none'; currentCustomizationItem = null; }

    // Fetch menu or fallback (robust fallback with many items, ensuring images work)
    async function initMenu() {
        try {
            const res = await fetch('menu.json?t='+Date.now());
            if(res.ok) {
                MENU = await res.json();
            } else throw new Error();
        } catch(e) {
            console.warn("Using hardcoded menu fallback with images support");
            MENU = {
                "Aloo Fries": [{ name: "Aloo Fries Medium", price: 80, details: "Crispy & spicy" }, { name: "Aloo Fries Large", price: 130, details: "Extra crunch" }],
                "Mo:Mo": [{ name: "Aloo Mo:Mo", variants: [{name:"Steam",price:100},{name:"Kothey",price:120}], details: "veg filling" }],
                "Burger": [{ name: "Veg Crispy Burger", price: 120 }, { name: "Chicken Cheese Burger", price: 180 }],
                "Chowmein": [{ name: "Veg Chowmein", price: 110 }, { name: "Egg Chowmein", price: 140 }],
                "Cold Drinks": [{ name: "Coca-Cola", price: 45 }, { name: "Sprite", price: 45 }]
            };
        }
        generateTabs();
        generateMenuItems();
        setupTabs();
    }

    // Event handlers
    document.addEventListener('DOMContentLoaded', () => {
        loadCart();
        initMenu();
        document.getElementById('currentYear').innerText = new Date().getFullYear();

        // cart modal
        const cartModal = document.getElementById('cartModal');
        const closeCart = document.getElementById('closeCart');
        document.getElementById('cartIcon').onclick = () => { updateCartDisplay(); cartModal.style.display = 'flex'; };
        closeCart.onclick = () => cartModal.style.display = 'none';
        window.onclick = (e) => { if(e.target === cartModal) cartModal.style.display = 'none'; if(e.target === document.getElementById('customizationModal')) closeCustomModal(); };

        document.getElementById('checkoutBtn').onclick = () => {
            if(!cart.length) { alert('Cart empty!'); return; }
            localStorage.setItem('daAlooOrigin', 'index.html');
            saveCart();
            window.location.href = 'location.html';
        };

        // Cart item modifications
        document.getElementById('cartItems').addEventListener('click', (e) => {
            const btn = e.target.closest('.quantity-btn');
            if(btn) {
                const idx = parseInt(btn.dataset.index);
                if(btn.dataset.action === 'increase') cart[idx].quantity++;
                else if(btn.dataset.action === 'decrease' && cart[idx].quantity>1) cart[idx].quantity--;
                else if(btn.dataset.action === 'decrease' && cart[idx].quantity===1) cart.splice(idx,1);
                saveCart(); updateCartBadge(); updateCartDisplay();
            }
            const remove = e.target.closest('.remove-btn');
            if(remove) {
                const idx = parseInt(remove.dataset.index);
                cart.splice(idx,1);
                saveCart(); updateCartBadge(); updateCartDisplay();
            }
        });

        // Add to cart via delegation
        document.addEventListener('click', (e) => {
            const addBtn = e.target.closest('.add-to-cart-btn');
            if(!addBtn) return;
            const name = addBtn.dataset.name;
            const price = parseInt(addBtn.dataset.price);
            const hasVariants = addBtn.dataset.hasVariants === 'true';
            if(hasVariants) { openCustomizationModal(name); }
            else {
                const itemObj = findMenuItem(name);
                const extras = (itemObj && itemObj.extras) ? itemObj.extras : [];
                addToCart(name, price, null, [], extras);
                addBtn.innerHTML = '<i class="fas fa-check"></i> Added!';
                setTimeout(() => { addBtn.innerHTML = `<i class="fas fa-plus"></i> Add to Cart`; }, 800);
            }
        });

        // Customization confirm
        const addCustom = document.getElementById('addToCartCustom');
        addCustom.onclick = () => {
            if(!currentCustomizationItem) return;
            const selectedRadio = document.querySelector('input[name="variantRadio"]:checked');
            if(selectedRadio) {
                const variant = { name: selectedRadio.value, price: parseInt(selectedRadio.dataset.price) };
                addToCart(currentCustomizationItem.name, variant.price, variant, [], []);
                closeCustomModal();
            } else alert("Select a variant");
        };
        document.getElementById('closeCustomization').onclick = closeCustomModal;
        document.getElementById('cancelCustomization').onclick = closeCustomModal;

        // Save menu as image
        document.getElementById('saveMenuBtn').onclick = () => {
            const img = new Image();
            img.onload = () => { const link = document.createElement('a'); link.href = 'images/menu.jpg'; link.download = 'da-aloo-menu.jpg'; link.click(); document.getElementById('saveNotification').classList.add('show'); setTimeout(()=>document.getElementById('saveNotification').classList.remove('show'),2500); };
            img.onerror = () => alert('Menu poster image not found (images/menu.jpg)');
            img.src = 'images/menu.jpg';
        };
    });
</script>
</body>
</html>
